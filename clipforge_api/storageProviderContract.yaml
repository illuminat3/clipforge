openapi: 3.1.1
info:
  title: Clipforge Storage Provider Contract
  description: |
    This is the contract that any storage provider container must implement
    in order to be compatible with the Video API container.

    The API container generates all IDs and handles accounts — the storage
    provider only needs to store and retrieve video files by the ID it is given.

    ## Implementing this contract

    Build a container that exposes these endpoints. Wire it in
    via docker-compose by setting `STORAGE_PROVIDER_URL` on the API container
    to point at your container.

  version: 1.0.0

servers:
  - url: http://localhost:port
    description: Local storage provider

tags:
  - name: Storage
    description: Core video storage operations

paths:
  /store:
    post:
      tags: [Storage]
      summary: Store a video
      description: |
        Receives a video file and stores it against the given ID.
        The ID is generated by the API container — the storage provider
        must use this exact ID for subsequent fetch/delete operations.
        If a video with this ID already exists, it should be overwritten.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, id, accountId]
              properties:
                file:
                  type: string
                  format: binary
                  description: The raw video file bytes
                id:
                  type: string
                  description: The ID assigned by the API container. Store against this key.
                  example: "vid_01j8k2n4p5q6r7s8t9"
                accountId:
                  type: string
                  description: The account this video belongs to. Used for listing.
                  example: "acc_01j8k2n4p5q6r7s8t9"
                fileName:
                  type: string
                  description: Original filename including extension, for metadata purposes.
                  example: "holiday-2024.mp4"
      responses:
        "200":
          description: Video stored successfully
        "400":
          description: Missing required fields
        "500":
          description: Storage failure

  /fetch/{id}:
    get:
      tags: [Storage]
      summary: Fetch a video stream
      description: |
        Returns the raw video stream for the given ID.

        **Range requests must be supported.** The web player depends on
        partial content responses for seeking. Implement the `Range` header
        and respond with `206 Partial Content` accordingly.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "vid_01j8k2n4p5q6r7s8t9"
        - name: Range
          in: header
          required: false
          description: Standard HTTP Range header for partial content requests
          schema:
            type: string
          example: "bytes=0-1048575"
      responses:
        "200":
          description: Full video stream
          headers:
            Accept-Ranges:
              schema:
                type: string
                example: bytes
            Content-Length:
              schema:
                type: integer
            Content-Type:
              schema:
                type: string
                example: video/mp4
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
        "206":
          description: Partial video stream (response to Range request)
          headers:
            Content-Range:
              schema:
                type: string
                example: "bytes 0-1048575/52428800"
            Content-Length:
              schema:
                type: integer
            Accept-Ranges:
              schema:
                type: string
                example: bytes
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Video not found

  /delete/{id}:
    delete:
      tags: [Storage]
      summary: Delete a video
      description: Permanently removes the video with the given ID from storage.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "vid_01j8k2n4p5q6r7s8t9"
      responses:
        "200":
          description: Video deleted successfully
        "404":
          description: Video not found
        "500":
          description: Deletion failure

  /list/{accountId}:
    get:
      tags: [Storage]
      summary: List videos for an account
      description: |
        Returns metadata for all videos associated with the given account ID.
        This does not return the video content, only the metadata needed
        for the API container to build account video listings.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          example: "acc_01j8k2n4p5q6r7s8t9"
      responses:
        "200":
          description: List of video metadata for this account
          content:
            application/json:
              schema:
                type: object
                required: [videos]
                properties:
                  videos:
                    type: array
                    items:
                      $ref: "#/components/schemas/VideoEntry"
              example:
                videos:
                  - id: "vid_01j8k2n4p5q6r7s8t9"
                    createdAt: "2024-11-01T10:30:00Z"
                    fileName: "holiday-2024.mp4"
                  - id: "vid_02j9l3o5q6r7s8t9u0"
                    createdAt: "2024-11-03T14:15:00Z"
                    fileName: "birthday.mp4"
        "500":
          description: Listing failure

components:
  schemas:
    VideoEntry:
      type: object
      required: [id, createdAt, fileName]
      properties:
        id:
          type: string
          description: The video ID as provided during /store
          example: "vid_01j8k2n4p5q6r7s8t9"
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the video was stored
          example: "2024-11-01T10:30:00Z"
        fileName:
          type: string
          description: Original filename as provided during /store
          example: "holiday-2024.mp4"
