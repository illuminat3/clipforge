services:
  postgres:
    image: postgres:16-alpine
    container_name: clipforge_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clipforge
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
